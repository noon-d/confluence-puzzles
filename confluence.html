<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Confluence</title>

  <style>
    :root{
      --gap: 10px;
      --tile-h: 52px;
      --radius: 14px;
      --border: 1px solid rgba(255,255,255,0.18);
      --bg: #0b0f14;
      --panel: rgba(255,255,255,0.05);
      --panel2: rgba(255,255,255,0.08);
      --text: rgba(255,255,255,0.92);
      --muted: rgba(255,255,255,0.65);
      --shadow: 0 8px 22px rgba(0,0,0,0.35);
      --cols: 12;           /* overridden by script.js */
      --tile-font: 12.5px;
      --ui-font: 13px;
    }

    /* ── Light mode — warm paper/ink palette ── */
    body.light{
      --border: 1px solid #d4cbbf;
      --bg: #f5f0e8;
      --panel: #ede7d9;
      --panel2: #e5ddd0;
      --text: #1a1612;
      --muted: #7a7165;
      --shadow: 0 2px 6px rgba(26,22,18,0.13), 0 1px 2px rgba(26,22,18,0.08);
    }
    body.light .gridWrap{
      background: #ede7d9;
      border-color: #d4cbbf;
      box-shadow: none;
    }
    body.light .tile{
      background: #f5f0e8;
      border-color: #d4cbbf;
      box-shadow: 0 2px 6px rgba(26,22,18,0.13), 0 1px 2px rgba(26,22,18,0.08);
      color: #1a1612;
    }
    body.light .tile.size2{
      background: #fdf3dc;
      border-color: #c8a050;
    }
    body.light .tile.sizeMid{
      background: #deeeff;
      border-color: #6aaade;
    }
    body.light .tile.sizeFull{
      background: #d6f5e6;
      border-color: #4db880;
    }
    body.light .tile.selected{outline:2px solid #6b665e;}
    body.light .tile.hint-highlight{
      outline:2px solid #b5451b;
      background: #fde8c0 !important;
    }
    body.light .flash.bad{background:rgba(181,69,27,.10);}
    body.light .flash.good{background:rgba(120, 220, 60, .12);}
    body.light .pill{
      background: #ede7d9;
      border-color: #d4cbbf;
      box-shadow: none;
    }
    body.light button.small{
      background: #ede7d9;
      border-color: #d4cbbf;
      box-shadow: none;
    }
    body.light button.small:hover{background: #e5ddd0;}
    body.light .tooltip{
      background: #f5f0e8;
      border-color: #d4cbbf;
      color: #1a1612;
      box-shadow: 0 4px 14px rgba(26,22,18,0.15);
    }

    /* ── Large font ── */
    body.large-font{
      --tile-font: 15.5px;
      --ui-font: 15px;
      --tile-h: 62px;
    }

    html,body{
      margin:0;height:100%;
      background:var(--bg);
      color:var(--text);
      font-family:system-ui,-apple-system,Segoe UI,Roboto,Helvetica,Arial,sans-serif;
    }

    .app{max-width:1400px;margin:0 auto;padding:16px 16px 40px;}

    header{
      display:flex;gap:12px;align-items:center;justify-content:space-between;
      flex-wrap:wrap;margin-bottom:12px;
    }

	.brand{
	  font-size:18px;
	  font-weight:600;
	  letter-spacing:.2px;
	}
	
	.brand em{font-style:italic;}
	
    .title{display:flex;flex-direction:column;gap:2px;}
    .title h1{font-size:18px;margin:0;}
    .title .sub{font-size:13px;color:var(--muted);}

    .stats{display:flex;gap:10px;flex-wrap:wrap;align-items:center;justify-content:flex-end;}

    .pill{
      background:var(--panel);
      border:var(--border);
      border-radius:999px;
      padding:8px 10px;
      font-size:var(--ui-font);
      color:var(--muted);
      display:inline-flex;
      align-items:center;
      gap:8px;
      box-shadow:var(--shadow);
    }
    .pill b{color:var(--text);}

    button.small{
      background:var(--panel2);
      border:var(--border);
      border-radius:10px;
      padding:8px 10px;
      color:var(--text);
      font-size:var(--ui-font);
      cursor:pointer;
      box-shadow:var(--shadow);
    }

    .gridWrap{
      position:relative;
      background:var(--panel);
      border:var(--border);
      border-radius:18px;
      padding:12px;
      box-shadow:var(--shadow);
    }

	.grid{
	  display:grid;
	  grid-template-columns: repeat(auto-fit, minmax(100px, 1fr));
	  gap: var(--gap);
	}
	
	@media (max-width: 520px){
	  .grid{
		grid-template-columns: repeat(auto-fit, minmax(92px, 1fr));
	  }
	}

    .tile{
      height:var(--tile-h);
      background:rgba(255,255,255,0.06);
      border:var(--border);
      border-radius:var(--radius);
      padding:6px 10px;
      display:flex;
      align-items:center;
      justify-content:center;
      text-align:center;
      font-size:var(--tile-font);
      line-height:1.1;
      cursor:pointer;
      user-select:none;
      box-shadow:0 6px 14px rgba(0,0,0,.25);
      word-break:break-word;
    }

    .tile.selected{outline:2px solid rgba(255,255,255,.5);}
    .tile.locked{cursor:default;}

    .tile.size2{background:rgba(255,209,102,.1);border-color:rgba(255,209,102,.35);}
    .tile.sizeMid{background:rgba(78,181,255,.1);border-color:rgba(78,181,255,.35);}
    .tile.sizeFull{background:rgba(78,229,155,.12);border-color:rgba(78,229,155,.45);}

    .tile.hint-highlight{
      outline:2px solid rgba(255,209,102,.9);
      background:rgba(255,209,102,.18) !important;
      transition:outline .1s, background .1s;
    }

    .flash{
      position:absolute;inset:0;border-radius:18px;
      pointer-events:none;opacity:0;transition:opacity .16s ease;
    }
    .flash.bad{background:rgba(255,92,122,.12);}
    .flash.good{background:rgba(78,229,155,.1);}
    .flash.show{opacity:1;}

    .tooltip{
      position:fixed;
      background:rgba(20,24,32,.96);
      border:1px solid rgba(255,255,255,.18);
      border-radius:14px;
      padding:10px 12px;
      font-size:var(--ui-font);
      display:none;
      z-index:50;
    }

    .tooltip .muted{color:var(--muted);}

    .footer{
      margin-top:12px;
      color:var(--muted);
      font-size:12.5px;
    }
  </style>
</head>

<body>
  <div class="app">
    <header>
      <div class="title">
		  <div class="brand"></div>
		  <h1>Puzzle Name</h1>
		  <div class="sub">This is the puzzle's description.</div>
	  </div>

      <div class="stats">
        <div class="pill">Complete: <b id="completeCount">0/0</b></div>
        <div class="pill">Score: <b id="scoreCount">0</b></div>

        <button class="small" id="hintBtn">Hint</button>
        <button class="small" id="shuffleBtn">Shuffle</button>
        <button class="small" id="sortBtn">Sort</button>
        <button class="small" id="resetBtn">Reset</button>
        <button class="small toggle-btn" id="lightBtn" title="Toggle light / dark mode">☀︎</button>
        <button class="small toggle-btn" id="fontBtn" title="Toggle large / regular font">A</button>
      </div>
    </header>

    <div class="gridWrap">
      <div class="flash bad" id="flashBad"></div>
      <div class="flash good" id="flashGood"></div>
      <div class="grid" id="grid"></div>
    </div>

    <div class="footer">
      Hover or long-press merged tiles to see contents.
    </div>
  </div>

  <div class="tooltip" id="tooltip"></div>

  <!-- Load puzzle + logic -->
  <script src="script.js"></script>
</body>
</html>
